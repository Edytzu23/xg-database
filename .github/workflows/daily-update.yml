name: Daily xPts Update

on:
  schedule:
    # 04:00 UTC daily (06:00 RO time CET / 07:00 CEST)
    - cron: '0 4 * * *'
  workflow_dispatch:  # manual trigger button

permissions:
  contents: write  # needed to commit db/xpts.db back to repo

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (UCL)
        run: |
          python -c "from src.pipeline.update import run_full_update; run_full_update(competition_id=1, scoring_system='ucl', skip_fbref=True)"

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/xpts.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit"
            exit 0
          fi
          git commit -m "auto: daily xPts pipeline update ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
